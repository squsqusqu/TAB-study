<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>My Playlist</title>
    <link rel="stylesheet" href="plistyle.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

<div class="container">
    <div class="item1">
        <div class="xmark"><i class="fa-solid fa-xmark"></i></div>
        <h1>Playlist</h1>

        <div class="item2">
            <div class="img"><i class="fa-regular fa-image fa-2xl"></i></div>
            <p id="song" class="no-wrap">Heavy<br>Rotation</p>
            <p id="name" style="top: 85%; font-size: 10px;">by yoenji</p>
        </div>

        <div class="play">
            <i class="fa-solid fa-play"></i>
            <span class="pl">PLAY</span>
        </div>
        <div class="heart"><i class="fa-solid fa-heart"></i></div>
        <div class="add"><i class="fa-solid fa-plus"></i></div>

        <div class="item3" id="square" style="top: 360px;">
            <p id="song">Love Hangover</p>
            <p id="name">Jennie & Dominic Fike</p>
        </div>

        <div class="item4" id="square" style="top: 450px;">
            <p id="song">What You Want</p>
            <p id="name" >Cortis</p>
        </div>

        <div class="item5" id="square" style="top: 540px;">
            <p id="song">Vanilla Days</p>
            <p id="name" >LNGSHOT</p>
        </div>

        <div class="item6" id="square" style="top: 630px;">
            <p id="song">Ryudejakeiru</p>
            <p id="name" >Silica Gel</p>
        </div>

    </div>
</div>

</body>
</html>
